name: Deploy Static Site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dog-breeds
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target folder exists
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /srv/static/dog-breeds"

      - name: Sync dist to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/static/dog-breeds/"

      - name: Smoke check
        run: |
          curl -fI https://dog-breeds.olha.dev